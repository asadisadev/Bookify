$kind: http-request
method: PUT
url: '{{baseUrl}}/api/organizations/{{orgId}}/approve'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Organization approved successfully", function () {
          const json = pm.response.json();
          pm.expect(json.success).to.be.true;
          pm.expect(json.message).to.include("approved");
      });
      pm.test("isApproved is now true", function () {
          const json = pm.response.json();
          pm.expect(json.organization.isApproved).to.be.true;
      });
